<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/estuardo3318/CantosHJNM/main/HJNM.png">
    <title>Coro HJNM</title>
    <style>
        body { margin: 0; }
        iframe { width: 100%; height: 100vh; border: none; }
    </style>
    
</head>
<body>
    <iframe id="pdf-iframe" src="https://mozilla.github.io/pdf.js/legacy/web/viewer.html?file=
    https://raw.githubusercontent.com/estuardo3318/CantosHJNM/main/CANTOSHJNM.pdf"></iframe>

    <script>
        // Reemplazar TIMESTAMP con la fecha/hora actual
        const iframe = document.querySelector('iframe');
        const urlBase = "https://mozilla.github.io/pdf.js/legacy/web/viewer.html?file=https://raw.githubusercontent.com/estuardo3318/CantosHJNM/main/CANTOSHJNM.pdf";
        iframe.src = `${urlBase}&_=${Date.now()}`;
    </script>
</body>
</html>
