<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/estuardo3318/CantosHJNM/main/HJNM.png">
    <title>Coro HJNM</title>
    <style>
        body { margin: 0; }
        iframe { width: 100%; height: 100vh; border: none; }
    </style>
    
</head>
<body>
    <iframe src="https://mozilla.github.io/pdf.js/legacy/web/viewer.html?file=
    https://raw.githubusercontent.com/estuardo3318/CantosHJNM/main/CANTOSHJNM.pdf"></iframe>

    <script>
        const iframe = document.getElementById('pdf-iframe');
        const urlBase = "https://mozilla.github.io/pdf.js/web/viewer.html?file=https://raw.githubusercontent.com/estuardo3318/CantosHJNM/main/CANTOSHJNM.pdf";
        
        // Función para reiniciar el visor a su estado original
        function reiniciarVisor() {
            // Recargar el iframe con la URL limpia (sin #page= ni &zoom=)
            iframe.src = urlBase;
        }
        
        // 1. Al cargar la página por primera vez
        window.addEventListener('load', reiniciarVisor);
        
        // 2. Cuando la página se refresca (el navegador la recarga)
        window.addEventListener('pageshow', function(event) {
            // Si la página viene de caché (refresco)
            if (event.persisted) {
                reiniciarVisor();
            }
        });
        
        // 3. Opcional: también al volver a la pestaña (borra cambios)
        document.addEventListener('visibilitychange', function() {
            if (!document.hidden) {
                reiniciarVisor();
            }
        });
    </script>
</body>
</html>
