<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Coro HJNM</title>
    <style>
        body { margin: 0; }
        iframe { width: 100%; height: 100vh; border: none; }
        /* Ocultar botones dentro del iframe */
        .toolbarButton#print,
        .toolbarButton#download {
            display: none !important;
        }
    </style>
    <script>
        //  BLOQUEAR ATAJOS DE TECLADO (Ctrl+S, Ctrl+P) 
        document.addEventListener('keydown', function(event) {
            // Ctrl+S (guardar) o Ctrl+P (imprimir)
            if ((event.ctrlKey || event.metaKey) && (event.key === 's' || event.key === 'p')) {
                event.preventDefault(); // Esto evita que el navegador ejecute la acción
                alert('La descarga e impresión están deshabilitadas.');
                return false;
            }
        });
    </script>
</head>
<body>
    <iframe src="https://mozilla.github.io/pdf.js/web/viewer.html?file=https://raw.githubusercontent.com/estuardo3318/CantosHJNM/main/CantosHJNM.pdf"></iframe>
</body>
</html>
