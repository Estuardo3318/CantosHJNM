<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/estuardo3318/CantosHJNM/main/HJNM.png">
    <title>Coro HJNM</title>
    <style>
        body { margin: 0; }
        iframe { width: 100%; height: 100vh; border: none; }
    </style>
    
</head>
<body>
    <iframe id="pdf-iframe" src="https://mozilla.github.io/pdf.js/legacy/web/viewer.html?file=
    https://raw.githubusercontent.com/estuardo3318/CantosHJNM/main/CANTOSHJNM.pdf"></iframe>

    <script>
        const iframe = document.getElementById('pdf-iframe');
        const pdfUrl = "https://raw.githubusercontent.com/estuardo3318/CantosHJNM/main/CANTOSHJNM.pdf";
        const baseViewer = "https://mozilla.github.io/pdf.js/web/viewer.html";
        
        function cargarVisorLimpio() {
            // Agregar un número aleatorio para evitar cualquier caché o estado guardado
            const timestamp = Date.now();
            const urlLimpia = `${baseViewer}?file=${encodeURIComponent(pdfUrl)}&_=${timestamp}`;
            iframe.src = urlLimpia;
        }
        
        // Cargar el visor limpio cada vez que se abre la página
        cargarVisorLimpio();
        
        // También reiniciar cuando la página se muestra (por si acaso)
        window.addEventListener('pageshow', function() {
            cargarVisorLimpio();
        });
    </script>
</body>
</html>
